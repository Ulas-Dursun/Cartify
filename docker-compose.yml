services:

  postgres:
    image: postgres:16-alpine
    container_name: cartify-postgres
    environment:
      POSTGRES_DB: cartifydb
      POSTGRES_USER: cartifyuser
      POSTGRES_PASSWORD: cartifypass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cartifyuser -d cartifydb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cartify-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cartifydb
      SPRING_DATASOURCE_USERNAME: cartifyuser
      SPRING_DATASOURCE_PASSWORD: cartifypass
      APPLICATION_JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      APPLICATION_JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres-data: