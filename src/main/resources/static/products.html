<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Cartify · Products</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#070710;--bg2:#0d0d1a;--bg3:#121220;--card:#16162a;--card2:#1c1c32;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--accent:#7c6aff;--accent2:#9d8fff;--accent3:#5b4de0;--glow:rgba(124,106,255,0.35);--pink:#ff6b9d;--cyan:#00d4ff;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e8e8f8;--text2:#9090b8;--text3:#5a5a80;--r:14px;--r2:10px}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        nav{position:sticky;top:0;z-index:100;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;background:rgba(7,7,16,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
        .brand{font-size:1.35rem;font-weight:800;text-decoration:none;background:linear-gradient(135deg,#7c6aff,#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
        .brand span{opacity:0.6}
        .nav-mid{display:flex;gap:0.25rem}
        .nav-mid a{color:var(--text2);text-decoration:none;padding:0.45rem 1rem;border-radius:8px;font-size:0.88rem;font-weight:500;transition:all 0.2s}
        .nav-mid a:hover,.nav-mid a.on{color:var(--text);background:rgba(255,255,255,0.05)}
        .nav-mid a.on{color:var(--accent2)}
        .nav-right{display:flex;align-items:center;gap:0.75rem}
        #nav-user{font-size:0.8rem;color:var(--text2);background:var(--card);border:1px solid var(--border);padding:0.3rem 0.85rem;border-radius:20px;display:none}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.6rem 1.3rem;border-radius:var(--r2);font-family:'Inter',sans-serif;font-size:0.875rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;text-decoration:none;position:relative}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;box-shadow:0 4px 20px var(--glow)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--glow)}
        .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
        .btn-ghost:hover{color:var(--text);border-color:var(--accent);background:rgba(124,106,255,0.08)}
        .btn-sm{padding:0.38rem 0.9rem;font-size:0.8rem}
        .btn-full{width:100%}
        .btn-red{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.18)}
        .btn-red:hover{background:rgba(239,68,68,0.22)}
        .btn-yellow{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.18)}
        .btn-yellow:hover{background:rgba(245,158,11,0.22)}

        .wrap{max-width:1140px;margin:0 auto;padding:2.5rem 1.5rem}

        /* ADMIN PANEL */
        .admin-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.75rem;margin-bottom:2.5rem;position:relative;overflow:hidden}
        .admin-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--pink))}
        .panel-title{font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1.25rem}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        .field{margin-bottom:0}
        .field label{display:block;font-size:0.75rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.45rem}
        .input{width:100%;padding:0.7rem 0.9rem;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);color:var(--text);font-family:'Inter',sans-serif;font-size:0.88rem;transition:all 0.2s;outline:none}
        .input:focus{border-color:var(--accent);background:var(--bg3);box-shadow:0 0 0 3px rgba(124,106,255,0.1)}
        .input::placeholder{color:var(--text3)}

        /* PAGE HEADER */
        .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem}
        .page-head h1{font-size:1.8rem;font-weight:800;letter-spacing:-0.75px}
        .page-head h1 span{color:var(--text3);font-size:1rem;font-weight:400;letter-spacing:0;margin-left:0.5rem}

        /* PRODUCTS GRID */
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.1rem}
        .pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem;display:flex;flex-direction:column;transition:all 0.25s;position:relative;overflow:hidden}
        .pcard::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,106,255,0.03),transparent);pointer-events:none}
        .pcard:hover{border-color:rgba(124,106,255,0.28);transform:translateY(-3px);box-shadow:0 16px 50px rgba(0,0,0,0.45)}
        .pcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.6rem}
        .pcard-name{font-size:1rem;font-weight:700;letter-spacing:-0.3px;line-height:1.3}
        .pcard-desc{font-size:0.82rem;color:var(--text2);line-height:1.6;margin-bottom:1.1rem;flex:1;min-height:40px}
        .pcard-foot{display:flex;align-items:center;justify-content:space-between;padding-top:1rem;border-top:1px solid var(--border);margin-top:auto}
        .price{font-size:1.15rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .badge{display:inline-flex;align-items:center;gap:0.3rem;padding:0.22rem 0.65rem;border-radius:20px;font-size:0.72rem;font-weight:700;letter-spacing:0.03em}
        .b-ok{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#4ade80}
        .b-low{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);color:#fbbf24}
        .b-out{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171}
        .admin-actions{display:flex;gap:0.5rem;margin-top:0.85rem}

        /* EMPTY */
        .empty{text-align:center;padding:5rem 2rem;color:var(--text3)}
        .empty-ico{font-size:3.5rem;margin-bottom:1rem;opacity:0.5}
        .empty p{font-size:0.95rem}

        /* SPINNER */
        .spin-wrap{display:flex;align-items:center;justify-content:center;padding:5rem}
        .spin{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp 0.7s linear infinite}
        @keyframes sp{to{transform:rotate(360deg)}}

        /* TOASTS */
        #toasts{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem}
        .t{padding:0.8rem 1.2rem;border-radius:10px;font-size:0.85rem;font-weight:500;animation:tin 0.3s ease;min-width:240px;box-shadow:0 8px 30px rgba(0,0,0,0.5)}
        .t-ok{background:#14532d;border:1px solid rgba(34,197,94,0.25);color:#86efac}
        .t-err{background:#7f1d1d;border:1px solid rgba(239,68,68,0.25);color:#fca5a5}
        @keyframes tin{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--card2);border-radius:3px}
        @media(max-width:640px){.form-row{grid-template-columns:1fr}.nav-mid{display:none}}
    </style>
</head>
<body>
<nav>
    <a class="brand" href="/">Cart<span>ify</span></a>
    <div class="nav-mid">
        <a href="/products.html" class="on">Products</a>
        <a href="/orders.html">Orders</a>
    </div>
    <div class="nav-right">
        <span id="nav-user"></span>
        <button id="nav-logout" class="btn btn-ghost btn-sm" style="display:none" onclick="logout()">Sign Out</button>
    </div>
</nav>

<div class="wrap">
    <div id="admin-section" style="display:none">
        <div class="admin-panel">
            <div class="panel-title">⚙ Admin · Add New Product</div>
            <div class="form-row" style="margin-bottom:1rem">
                <div class="field"><label>Product Name</label><input class="input" id="p-name" placeholder="e.g. Mechanical Keyboard"/></div>
                <div class="field"><label>Price ($)</label><input class="input" id="p-price" type="number" step="0.01" min="0.01" placeholder="0.00"/></div>
            </div>
            <div class="form-row" style="margin-bottom:1.25rem">
                <div class="field"><label>Stock</label><input class="input" id="p-stock" type="number" min="0" placeholder="0"/></div>
                <div class="field"><label>Description</label><input class="input" id="p-desc" placeholder="Optional"/></div>
            </div>
            <button class="btn btn-primary" onclick="createProduct()">+ Create Product</button>
        </div>
    </div>

    <div class="page-head">
        <h1>Products <span id="p-count"></span></h1>
        <a href="/orders.html" class="btn btn-ghost">🛒 My Orders</a>
    </div>

    <div id="products-container"><div class="spin-wrap"><div class="spin"></div></div></div>
</div>
<div id="toasts"></div>

<script>
    const API='';
    function getToken(){return localStorage.getItem('c_token')}
    function getRole(){return localStorage.getItem('c_role')}
    function getEmail(){return localStorage.getItem('c_email')}
    function isLoggedIn(){return!!getToken()}
    function isAdmin(){return getRole()==='ADMIN'}
    function authHeaders(){return{'Content-Type':'application/json','Authorization':'Bearer '+getToken()}}
    async function apiFetch(p,o={}){const r=await fetch(API+p,o);if(r.status===204)return null;const d=await r.json().catch(()=>null);if(!r.ok)throw new Error(d?.message||'Request failed');return d}
    function toast(msg,type='ok'){const c=document.getElementById('toasts');const t=document.createElement('div');t.className=`t t-${type}`;t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3500)}
    function logout(){['c_token','c_role','c_email'].forEach(k=>localStorage.removeItem(k));window.location.href='/'}
    function updateNav(){
        const u=document.getElementById('nav-user');
        const lo=document.getElementById('nav-logout');
        if(isLoggedIn()){u.textContent=getEmail()+(isAdmin()?' · ADMIN':'');u.style.display='block';lo.style.display='inline-flex'}
        else{window.location.href='/'}
    }
    updateNav();
    if(isAdmin())document.getElementById('admin-section').style.display='block';

    async function loadProducts(){
        const c=document.getElementById('products-container');
        try{
            const ps=await apiFetch('/api/products',{headers:authHeaders()});
            document.getElementById('p-count').textContent=ps.length+' items';
            if(!ps.length){c.innerHTML='<div class="empty"><div class="empty-ico">📦</div><p>No products yet.</p></div>';return}
            c.innerHTML='<div class="grid">'+ps.map(card).join('')+'</div>';
        }catch(e){c.innerHTML='<div class="empty"><p>'+e.message+'</p></div>'}
    }

    function card(p){
        const sb=p.stock===0?'<span class="badge b-out">Out of stock</span>':p.stock<5?`<span class="badge b-low">⚠ ${p.stock} left</span>`:`<span class="badge b-ok">✓ ${p.stock} in stock</span>`;
        const admin=isAdmin()?`<div class="admin-actions"><button class="btn btn-yellow btn-sm" onclick="editStock('${p.id}',${p.stock})">Edit Stock</button><button class="btn btn-red btn-sm" onclick="delProduct('${p.id}')">Delete</button></div>`:'';
        return`<div class="pcard" id="pc-${p.id}">
    <div class="pcard-top"><div class="pcard-name">${p.name}</div></div>
    <div class="pcard-desc">${p.description||'No description provided.'}</div>
    <div class="pcard-foot"><span class="price">$${parseFloat(p.price).toFixed(2)}</span>${sb}</div>
    ${admin}</div>`;
    }

    async function createProduct(){
        const name=document.getElementById('p-name').value.trim();
        const price=document.getElementById('p-price').value;
        const stock=document.getElementById('p-stock').value;
        const description=document.getElementById('p-desc').value.trim();
        if(!name||!price||stock===''){toast('Fill in all required fields.','err');return}
        try{
            await apiFetch('/api/products',{method:'POST',headers:authHeaders(),body:JSON.stringify({name,description,price:parseFloat(price),stock:parseInt(stock)})});
            toast('Product created successfully!');
            ['p-name','p-price','p-stock','p-desc'].forEach(id=>document.getElementById(id).value='');
            loadProducts();
        }catch(e){toast(e.message,'err')}
    }

    async function editStock(id,cur){
        const v=prompt(`Current stock: ${cur}\nEnter new stock:`,cur);
        if(v===null||isNaN(parseInt(v)))return;
        try{await apiFetch(`/api/products/${id}/stock`,{method:'PATCH',headers:authHeaders(),body:JSON.stringify({stock:parseInt(v)})});toast('Stock updated!');loadProducts()}
        catch(e){toast(e.message,'err')}
    }

    async function delProduct(id){
        if(!confirm('Delete this product?'))return;
        try{await apiFetch(`/api/products/${id}`,{method:'DELETE',headers:authHeaders()});toast('Product deleted.');document.getElementById('pc-'+id)?.remove()}
        catch(e){toast(e.message,'err')}
    }

    loadProducts();
</script>
</body>
</html>
