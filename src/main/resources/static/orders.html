<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Cartify · Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#070710;--bg2:#0d0d1a;--bg3:#12122040;--card:#16162a;--card2:#1c1c32;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--accent:#7c6aff;--accent2:#9d8fff;--accent3:#5b4de0;--glow:rgba(124,106,255,0.35);--pink:#ff6b9d;--cyan:#00d4ff;--text:#e8e8f8;--text2:#9090b8;--text3:#5a5a80;--r:14px;--r2:10px}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        nav{position:sticky;top:0;z-index:100;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;background:rgba(7,7,16,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
        .brand{font-size:1.35rem;font-weight:800;text-decoration:none;background:linear-gradient(135deg,#7c6aff,#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
        .brand span{opacity:0.6}
        .nav-mid{display:flex;gap:0.25rem}
        .nav-mid a{color:var(--text2);text-decoration:none;padding:0.45rem 1rem;border-radius:8px;font-size:0.88rem;font-weight:500;transition:all 0.2s}
        .nav-mid a:hover{color:var(--text);background:rgba(255,255,255,0.05)}
        .nav-mid a.on{color:var(--accent2)}
        .nav-right{display:flex;align-items:center;gap:0.75rem}
        #nav-user{font-size:0.8rem;color:var(--text2);background:var(--card);border:1px solid var(--border);padding:0.3rem 0.85rem;border-radius:20px;display:none}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.6rem 1.3rem;border-radius:var(--r2);font-family:'Inter',sans-serif;font-size:0.875rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;text-decoration:none}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;box-shadow:0 4px 20px var(--glow)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--glow)}
        .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
        .btn-ghost:hover{color:var(--text);border-color:var(--accent);background:rgba(124,106,255,0.08)}
        .btn-sm{padding:0.38rem 0.9rem;font-size:0.8rem}
        .btn-full{width:100%}

        .wrap{max-width:900px;margin:0 auto;padding:2.5rem 1.5rem}
        .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem}
        .page-head h1{font-size:1.8rem;font-weight:800;letter-spacing:-0.75px}
        .page-head h1 span{color:var(--text3);font-size:1rem;font-weight:400;letter-spacing:0;margin-left:0.5rem}

        /* ORDER CARD */
        .ocard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem;transition:all 0.25s;position:relative;overflow:hidden}
        .ocard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
        .ocard.PENDING::before{background:var(--yellow,#f59e0b)}
        .ocard.CONFIRMED::before{background:var(--accent)}
        .ocard.SHIPPED::before{background:var(--cyan)}
        .ocard.DELIVERED::before{background:#22c55e}
        .ocard.CANCELLED::before{background:#ef4444}
        .ocard:hover{border-color:rgba(124,106,255,0.25);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
        .ocard-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.75rem}
        .oid{font-family:monospace;font-size:0.8rem;color:var(--text3);background:var(--bg2);padding:0.25rem 0.65rem;border-radius:6px;border:1px solid var(--border)}
        .odate{font-size:0.78rem;color:var(--text3);margin-top:0.2rem}
        .ototal{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .badge{display:inline-flex;align-items:center;padding:0.25rem 0.7rem;border-radius:20px;font-size:0.72rem;font-weight:700;letter-spacing:0.04em}
        .b-pending{background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.2);color:#fbbf24}
        .b-confirmed{background:rgba(124,106,255,0.12);border:1px solid rgba(124,106,255,0.2);color:var(--accent2)}
        .b-shipped{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);color:var(--cyan)}
        .b-delivered{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.2);color:#4ade80}
        .b-cancelled{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.2);color:#f87171}
        .oitems{display:flex;flex-direction:column;gap:0.4rem}
        .oitem{display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0.75rem;background:var(--bg2);border-radius:8px;border:1px solid var(--border)}
        .oitem-name{font-size:0.85rem;font-weight:500}
        .oitem-qty{font-size:0.78rem;color:var(--text3)}
        .oitem-sub{font-size:0.85rem;font-weight:600;color:var(--accent2)}

        /* MODAL */
        .overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.78);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:1.5rem}
        .overlay.open{display:flex}
        .modal{background:var(--card);border:1px solid var(--border2);border-radius:18px;padding:2rem;width:100%;max-width:500px;box-shadow:0 40px 80px rgba(0,0,0,0.6);animation:up 0.3s cubic-bezier(0.34,1.56,0.64,1);max-height:90vh;display:flex;flex-direction:column}
        @keyframes up{from{opacity:0;transform:translateY(30px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
        .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;flex-shrink:0}
        .modal-head h2{font-size:1.2rem;font-weight:800;letter-spacing:-0.3px}
        .close-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.9rem;transition:all 0.2s}
        .close-btn:hover{color:var(--text);border-color:var(--border2)}
        .modal-sub{font-size:0.82rem;color:var(--text3);margin-bottom:1.25rem;flex-shrink:0}
        .product-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1.25rem;padding-right:4px}
        .prow{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 0.9rem;background:var(--bg2);border-radius:10px;border:1px solid var(--border);transition:border-color 0.2s}
        .prow:hover{border-color:rgba(124,106,255,0.2)}
        .prow-info{flex:1}
        .prow-name{font-size:0.88rem;font-weight:600}
        .prow-meta{font-size:0.76rem;color:var(--text3);margin-top:2px}
        .qty-wrap{display:flex;align-items:center;gap:0.6rem}
        .qbtn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);background:var(--card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all 0.15s;font-family:'Inter',sans-serif}
        .qbtn:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,106,255,0.08)}
        .qval{font-size:0.9rem;font-weight:700;min-width:22px;text-align:center}
        .modal-foot{display:flex;align-items:center;justify-content:space-between;padding-top:1rem;border-top:1px solid var(--border);flex-shrink:0}
        .order-total-label{font-size:0.82rem;color:var(--text3)}
        .order-total-val{font-size:1.15rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

        .empty{text-align:center;padding:5rem 2rem;color:var(--text3)}
        .empty-ico{font-size:3.5rem;margin-bottom:1rem;opacity:0.5}
        .spin-wrap{display:flex;align-items:center;justify-content:center;padding:5rem}
        .spin{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp 0.7s linear infinite}
        @keyframes sp{to{transform:rotate(360deg)}}

        #toasts{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem}
        .t{padding:0.8rem 1.2rem;border-radius:10px;font-size:0.85rem;font-weight:500;animation:tin 0.3s ease;min-width:240px;box-shadow:0 8px 30px rgba(0,0,0,0.5)}
        .t-ok{background:#14532d;border:1px solid rgba(34,197,94,0.25);color:#86efac}
        .t-err{background:#7f1d1d;border:1px solid rgba(239,68,68,0.25);color:#fca5a5}
        @keyframes tin{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--card2);border-radius:3px}
        @media(max-width:640px){.nav-mid{display:none}}
    </style>
</head>
<body>
<nav>
    <a class="brand" href="/">Cart<span>ify</span></a>
    <div class="nav-mid">
        <a href="/products.html">Products</a>
        <a href="/orders.html" class="on">Orders</a>
    </div>
    <div class="nav-right">
        <span id="nav-user"></span>
        <button id="nav-logout" class="btn btn-ghost btn-sm" style="display:none" onclick="logout()">Sign Out</button>
    </div>
</nav>

<div class="wrap">
    <div class="page-head">
        <h1>My Orders <span id="o-count"></span></h1>
        <button class="btn btn-primary" onclick="openNewOrder()">+ New Order</button>
    </div>
    <div id="orders-container"><div class="spin-wrap"><div class="spin"></div></div></div>
</div>

<!-- NEW ORDER MODAL -->
<div class="overlay" id="order-modal">
    <div class="modal">
        <div class="modal-head">
            <h2>Place New Order</h2>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-sub">Select products and set quantities</div>
        <div class="product-list" id="product-list"></div>
        <div class="modal-foot">
            <div>
                <div class="order-total-label">Estimated Total</div>
                <div class="order-total-val" id="order-total">$0.00</div>
            </div>
            <button class="btn btn-primary" onclick="submitOrder()">Place Order →</button>
        </div>
    </div>
</div>

<div id="toasts"></div>
<script>
    const API='';
    let allProds=[],qtys={};
    function getToken(){return localStorage.getItem('c_token')}
    function getRole(){return localStorage.getItem('c_role')}
    function getEmail(){return localStorage.getItem('c_email')}
    function isLoggedIn(){return!!getToken()}
    function isAdmin(){return getRole()==='ADMIN'}
    function authHeaders(){return{'Content-Type':'application/json','Authorization':'Bearer '+getToken()}}
    async function apiFetch(p,o={}){const r=await fetch(API+p,o);if(r.status===204)return null;const d=await r.json().catch(()=>null);if(!r.ok)throw new Error(d?.message||'Request failed');return d}
    function toast(msg,type='ok'){const c=document.getElementById('toasts');const t=document.createElement('div');t.className=`t t-${type}`;t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3500)}
    function logout(){['c_token','c_role','c_email'].forEach(k=>localStorage.removeItem(k));window.location.href='/'}
    function updateNav(){
        const u=document.getElementById('nav-user');const lo=document.getElementById('nav-logout');
        if(isLoggedIn()){u.textContent=getEmail()+(isAdmin()?' · ADMIN':'');u.style.display='block';lo.style.display='inline-flex'}
        else window.location.href='/'
    }
    updateNav();

    function statusBadge(s){const m={PENDING:'b-pending',CONFIRMED:'b-confirmed',SHIPPED:'b-shipped',DELIVERED:'b-delivered',CANCELLED:'b-cancelled'};return`<span class="badge ${m[s]||''}">${s}</span>`}

    async function loadOrders(){
        const c=document.getElementById('orders-container');
        try{
            const endpoint = isAdmin() ? '/api/orders/all' : '/api/orders';
            const os=await apiFetch(endpoint,{headers:authHeaders()});
            document.getElementById('o-count').textContent=os.length+' total';
            if(!os.length){
                c.innerHTML='<div class="empty"><div class="empty-ico">🛒</div><p>No orders yet.</p></div>';
                return;
            }
            c.innerHTML=os.map(orderCard).join('');
        }catch(e){
            c.innerHTML='<div class="empty"><p>'+e.message+'</p></div>';
        }
    }

    function orderCard(o){
        const date=new Date(o.createdAt).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
        const items=o.items.map(i=>`

    <div class="oitem">
      <div><div class="oitem-name">${i.productName}</div><div class="oitem-qty">× ${i.quantity} @ $${parseFloat(i.unitPrice).toFixed(2)}</div></div>
      <div class="oitem-sub">$${parseFloat(i.subtotal).toFixed(2)}</div>
    </div>`).join('');
        const userInfo = isAdmin()
            ? `<div style="font-size:0.75rem;color:var(--accent2);margin-top:3px">👤 ${o.userEmail}</div>`
            : '';

        const transitions = {
            PENDING:   ['CONFIRMED','CANCELLED'],
            CONFIRMED: ['SHIPPED','CANCELLED'],
            SHIPPED:   ['DELIVERED'],
            DELIVERED: [],
            CANCELLED: []
        };

        const adminActions = isAdmin() && transitions[o.status]?.length > 0
            ? `<div style="display:flex;gap:0.5rem;margin-top:0.9rem;flex-wrap:wrap">
        ${transitions[o.status].map(s => `
          <button class="btn btn-sm"
            style="background:rgba(124,106,255,0.12);color:#a78bfa;border:1px solid rgba(124,106,255,0.2);font-size:0.78rem"
            onclick="updateStatus('${o.id}','${s}')">
            → ${s}
          </button>`).join('')}
       </div>`
            : '';

        return`<div class="ocard ${o.status}" id="oc-${o.id}">
    <div class="ocard-head">
      <div><div class="oid">#${o.id.slice(0,8).toUpperCase()}</div><div class="odate">${date}</div></div>
      <div style="display:flex;align-items:center;gap:0.75rem">${statusBadge(o.status)}<div class="ototal">$${parseFloat(o.totalPrice).toFixed(2)}</div></div>
    </div>
    <div class="oitems">${items}</div>
    ${adminActions}
  </div>`;
    }

    async function openNewOrder(){
        qtys={};
        try{
            allProds=await apiFetch('/api/products',{headers:authHeaders()});
            const list=document.getElementById('product-list');
            const active=allProds.filter(p=>p.stock>0);
            if(!active.length){list.innerHTML='<p style="color:var(--text3);font-size:0.85rem;text-align:center;padding:2rem">No products in stock.</p>';}
            else{list.innerHTML=active.map(p=>`
      <div class="prow">
        <div class="prow-info">
          <div class="prow-name">${p.name}</div>
          <div class="prow-meta">$${parseFloat(p.price).toFixed(2)} &nbsp;·&nbsp; ${p.stock} in stock</div>
        </div>
        <div class="qty-wrap">
          <button class="qbtn" onclick="chQty('${p.id}',-1,${p.stock},${p.price})">−</button>
          <div class="qval" id="q-${p.id}">0</div>
          <button class="qbtn" onclick="chQty('${p.id}',1,${p.stock},${p.price})">+</button>
        </div>
      </div>`).join('')}
            calcTotal();
            document.getElementById('order-modal').classList.add('open');
        }catch(e){toast(e.message,'err')}
    }

    function closeModal(){document.getElementById('order-modal').classList.remove('open')}

    function chQty(id,d,max,price){
        const cur=qtys[id]||0;
        const next=Math.max(0,Math.min(max,cur+d));
        qtys[id]=next;
        document.getElementById('q-'+id).textContent=next;
        calcTotal();
    }

    function calcTotal(){
        let t=0;
        allProds.forEach(p=>{t+=(qtys[p.id]||0)*parseFloat(p.price)});
        document.getElementById('order-total').textContent='$'+t.toFixed(2);
    }

    async function submitOrder(){
        const items=Object.entries(qtys).filter(([_,q])=>q>0).map(([productId,quantity])=>({productId,quantity}));
        if(!items.length){toast('Select at least one product.','err');return}
        try{
            await apiFetch('/api/orders',{method:'POST',headers:authHeaders(),body:JSON.stringify({items})});
            closeModal();toast('Order placed successfully! 🎉');loadOrders();
        }catch(e){toast(e.message,'err')}
    }

    document.getElementById('order-modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
    loadOrders();
    async function updateStatus(orderId, status){
        try{
            await apiFetch(`/api/orders/${orderId}/status`,{
                method:'PATCH',
                headers:authHeaders(),
                body:JSON.stringify({status})
            });
            toast(`Order updated to ${status}`);
            loadOrders();
        }catch(e){toast(e.message,'err')}
    }
</script>
</body>
</html>
